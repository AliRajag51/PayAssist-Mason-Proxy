services:
  frontend:
    build:
      context: .
      args:
        INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://backend:5000}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
        # Optional by design: the UI falls back to cash-on-delivery checkout
        # when no Stripe key / PayPal client id is configured.
        NEXT_PUBLIC_STRIPE_KEY: ${NEXT_PUBLIC_STRIPE_KEY:-}
        NEXT_PUBLIC_PAYPAL_CLIENT_ID: ${NEXT_PUBLIC_PAYPAL_CLIENT_ID:-}
        NEXT_PUBLIC_ENABLE_STRIPE: ${NEXT_PUBLIC_ENABLE_STRIPE:-true}
        NEXT_PUBLIC_ENABLE_PAYPAL: ${NEXT_PUBLIC_ENABLE_PAYPAL:-true}
    restart: unless-stopped
    # Proper PID 1: reaps zombies and forwards SIGTERM for fast, clean redeploys.
    init: true
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://backend:5000}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
      NEXT_PUBLIC_STRIPE_KEY: ${NEXT_PUBLIC_STRIPE_KEY:-}
      NEXT_PUBLIC_PAYPAL_CLIENT_ID: ${NEXT_PUBLIC_PAYPAL_CLIENT_ID:-}
      NEXT_PUBLIC_ENABLE_STRIPE: ${NEXT_PUBLIC_ENABLE_STRIPE:-true}
      NEXT_PUBLIC_ENABLE_PAYPAL: ${NEXT_PUBLIC_ENABLE_PAYPAL:-true}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://127.0.0.1:3000/').then(r => process.exit(r.status < 500 ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
